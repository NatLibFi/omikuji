name: CI
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:

env:
  package_name: omikuji
  python.architecture: x64

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V

      - name: Cargo test
        run: |
          set -e -x
          cargo fmt --all -- --check
          cargo test --features cli
          cd c-api
          cargo fmt --all -- --check
          cargo test

      - name: Run example
        run: |
          set -e -x
          cargo install --path . --features cli --locked
          omikuji --help
          cd examples
          bash run_cli.sh

  python-sdist:
    runs-on: ubuntu-latest
    env:
      python.version: '3.12'
      sdist: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python.version }}
          architecture: ${{ env.python.architecture }}
      - name: Choose default Python binary
        run: echo "PYBIN=python" >> $GITHUB_ENV
      - name: Choose Python for manylinux
        if: env.manylinux == 'true'
        shell: bash
        run: |
          set -e
          case ${{ matrix.python-version }} in
            3.10) PYBIN=/opt/python/cp310-cp310/bin/python ;;
            3.11) PYBIN=/opt/python/cp311-cp311/bin/python ;;
            3.12) PYBIN=/opt/python/cp312-cp312/bin/python ;;
          esac
          echo "PYBIN=$PYBIN" >> $GITHUB_ENV
      - name: Query Python version
        run: |
          set -e -x
          which "$PYBIN"
          "$PYBIN" -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        run: |
          set -e -x
          "$PYBIN" -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "packaging>=26.2" "milksnake>=0.1.6"
          "$PYBIN" -m pip --version
          "$PYBIN" -m wheel version
          "$PYBIN" -m twine --version
      - name: Check Python code format
        run: |
          "$PYBIN" -m pip install --user black
          "$PYBIN" -m black --check ./
      - name: Build source distribution
        if: env.sdist == 'true'
        run: |
          "$PYBIN" setup.py sdist
      - name: Install Rust (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Test install from source distribution
        if: env.sdist == 'true'
        run: |
          "$PYBIN" -m pip -vvv install --user dist/*
      - name: Check artifacts with twine
        run: |
          set -e -x
          "$PYBIN" -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }} ${{ env.python.architecture }}
          path: dist/

  python-manylinux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64:latest
    env:
      manylinux: true
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      # Python build steps identical to python-sdist (inlined for direct translation)
      - name: Setup Python
        if: env.manylinux != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ env.python.architecture }}
      - name: Choose default Python binary
        if: env.manylinux != 'true'
        run: echo "PYBIN=python" >> $GITHUB_ENV
      - name: Choose Python for manylinux
        if: env.manylinux == 'true'
        shell: bash
        run: |
          set -e
          case ${{ matrix.python-version }} in
            3.10) PYBIN=/opt/python/cp310-cp310/bin/python3 ;;
            3.11) PYBIN=/opt/python/cp311-cp311/bin/python3 ;;
            3.12) PYBIN=/opt/python/cp312-cp312/bin/python3 ;;
          esac
          echo "PYBIN=$PYBIN" >> $GITHUB_ENV
      - name: Query Python version
        run: |
          set -e -x
          which "$PYBIN"
          "$PYBIN" -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        run: |
          set -e -x
          "$PYBIN" -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "milksnake>=0.1.6"
          "$PYBIN" -m pip --version
          "$PYBIN" -m wheel version
          "$PYBIN" -m twine --version
      - name: Check Python code format
        run: |
          "$PYBIN" -m pip install --user black
          "$PYBIN" -m black --check ./
      - name: Build source distribution
        if: env.sdist == 'true'
        run: |
          "$PYBIN" setup.py sdist
      - name: Install Rust (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Test install from source distribution
        if: env.sdist == 'true'
        run: |
          "$PYBIN" -m pip -vvv install --user dist/*
      - name: Build wheels
        if: env.sdist != 'true'
        run: |
          "$PYBIN" -m pip -vvv wheel . -w wheelhouse/
      - name: auditwheel repair (manylinux)
        if: env.manylinux == 'true' && env.sdist != 'true'
        run: |
          set -e -x
          for whl in wheelhouse/${{ env.package_name }}-*.whl; do
            auditwheel repair "$whl" -w wheelhouse/
          done
          ls -lh wheelhouse/
      - name: Test installing wheels and run examples
        if: env.sdist != 'true'
        run: |
          set -e -x
          ls -lh wheelhouse/
          "$PYBIN" -m pip install ${{ env.package_name }} --no-index -f wheelhouse/ --user
          "$PYBIN" -c "import sys; sys.path.remove(''); import ${{ env.package_name }}; print('Installed version: ' + ${{ env.package_name }}.__version__)"
          cd examples
          "$PYBIN" run_py.py
          "$PYBIN" -m pip uninstall -y ${{ env.package_name }}
      - name: Prepare wheels for publish
        if: env.sdist != 'true' && env.manylinux != 'true'
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*.whl dist/
      - name: Prepare wheels for publish (manylinux)
        if: env.sdist != 'true' && env.manylinux == 'true'
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*manylinux*.whl dist/
      - name: Check artifacts with twine
        run: |
          set -e -x
          "$PYBIN" -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }} ${{ env.python.architecture }}
          path: dist/

  python-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v4
      # Python build steps identical to python-sdist (inlined)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ env.python.architecture }}
      - name: Choose default Python binary
        run: echo "PYBIN=python" >> $GITHUB_ENV
      - name: Configure Visual Studio (Windows)
        shell: cmd
        run: '"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -no_logo -arch=x64'
      - name: Query Python version
        shell: bash
        run: |
          set -e -x
          which "$PYBIN"
          "$PYBIN" -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        shell: bash
        run: |
          set -e -x
          "$PYBIN" -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "milksnake>=0.1.6"
          "$PYBIN" -m pip --version
          "$PYBIN" -m wheel version
          "$PYBIN" -m twine --version
      - name: Check Python code format
        shell: bash
        run: |
          "$PYBIN" -m pip install --user black
          "$PYBIN" -m black --check ./
      - name: Build source distribution
        if: env.sdist == 'true'
        shell: bash
        run: |
          "$PYBIN" setup.py sdist
      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        run: |
          set -e
          curl -sSf -o rustup-init.exe https://win.rustup.rs
          rustup-init.exe -y --default-toolchain %RUSTUP_TOOLCHAIN%
          echo "%USERPROFILE%\.cargo\bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Test install from source distribution
        if: env.sdist == 'true'
        shell: bash
        run: |
          "$PYBIN" -m pip -vvv install --user dist/*
      - name: Build wheels
        if: env.sdist != 'true'
        shell: bash
        run: |
          "$PYBIN" -m pip -vvv wheel . -w wheelhouse/
      - name: Test installing wheels and run examples
        if: env.sdist != 'true'
        shell: bash
        run: |
          set -e -x
          ls -lh wheelhouse/
          "$PYBIN" -m pip install ${{ env.package_name }} --no-index -f wheelhouse/ --user
          "$PYBIN" -c "import sys; sys.path.remove(''); import ${{ env.package_name }}; print('Installed version: ' + ${{ env.package_name }}.__version__)"
          cd examples
          "$PYBIN" run_py.py
          "$PYBIN" -m pip uninstall -y ${{ env.package_name }}
      - name: Prepare wheels for publish
        if: env.sdist != 'true' && env.manylinux != 'true'
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*.whl dist/
      - name: Check artifacts with twine
        shell: bash
        run: |
          set -e -x
          "$PYBIN" -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }} ${{ env.python.architecture }}
          path: dist/

  python-macos:
    runs-on: macos-15
    env:
      SYSTEM_VERSION_COMPAT: 0
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      # Python build steps identical to python-sdist (inlined)
      - name: Setup Python
        if: env.manylinux != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ env.python.architecture }}
      - name: Choose default Python binary
        if: env.manylinux != 'true'
        run: echo "PYBIN=python" >> $GITHUB_ENV
      - name: Install & Choose Python for Mac
        if: runner.os == 'macOS' && env.manylinux != 'true'
        shell: bash
        run: |
          set -e
          case ${{ matrix.python-version }} in
            3.10) PY_FULL_VERSION=3.10.9; MACOS_VERSION=11 ;;
            3.11) PY_FULL_VERSION=3.11.9; MACOS_VERSION=11 ;;
            3.12) PY_FULL_VERSION=3.12.9; MACOS_VERSION=11 ;;
          esac
          INSTALLER_NAME=python-$PY_FULL_VERSION-macos$MACOS_VERSION.pkg
          curl https://www.python.org/ftp/python/$PY_FULL_VERSION/$INSTALLER_NAME --output $INSTALLER_NAME
          sudo installer -pkg $INSTALLER_NAME -target /
          echo "/Users/runner/Library/Python/${{ matrix.python-version }}/bin" >> $GITHUB_PATH
          PYBIN=/usr/local/bin/python${{ matrix.python-version }}
          curl https://bootstrap.pypa.io/get-pip.py | "$PYBIN"
          echo "PYBIN=$PYBIN" >> $GITHUB_ENV
      - name: Query Python version
        run: |
          set -e -x
          which "$PYBIN"
          "$PYBIN" -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        run: |
          set -e -x
          "$PYBIN" -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "milksnake>=0.1.6"
          "$PYBIN" -m pip --version
          "$PYBIN" -m wheel version
          "$PYBIN" -m twine --version
      - name: Check Python code format
        run: |
          "$PYBIN" -m pip install --user black
          "$PYBIN" -m black --check ./
      - name: Build source distribution
        if: env.sdist == 'true'
        run: |
          "$PYBIN" setup.py sdist
      - name: Install Rust (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Test install from source distribution
        if: env.sdist == 'true'
        run: |
          "$PYBIN" -m pip -vvv install --user dist/*
      - name: Build wheels
        if: env.sdist != 'true'
        run: |
          "$PYBIN" -m pip -vvv wheel . -w wheelhouse/
      - name: Delocate wheels (macOS)
        if: runner.os == 'macOS' && env.sdist != 'true'
        run: |
          set -e -x
          "$PYBIN" -m pip install --user delocate
          delocate-wheel --version
          delocate-wheel --require-archs universal2 wheelhouse/${{ env.package_name }}-*.whl
          ls -lh wheelhouse/
      - name: Test installing wheels and run examples
        if: env.sdist != 'true'
        run: |
          set -e -x
          ls -lh wheelhouse/
          "$PYBIN" -m pip install ${{ env.package_name }} --no-index -f wheelhouse/ --user
          "$PYBIN" -c "import sys; sys.path.remove(''); import ${{ env.package_name }}; print('Installed version: ' + ${{ env.package_name }}.__version__)"
          cd examples
          "$PYBIN" run_py.py
          "$PYBIN" -m pip uninstall -y ${{ env.package_name }}
      - name: Prepare wheels for publish
        if: env.sdist != 'true' && env.manylinux != 'true'
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*.whl dist/
      - name: Check artifacts with twine
        run: |
          set -e -x
          "$PYBIN" -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }} ${{ env.python.architecture }}
          path: dist/
