name: CI
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:

env:
  package_name: omikuji

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Cargo test
        run: |
          set -e -x
          cargo fmt --all -- --check
          cargo test --features cli
          cd c-api
          cargo fmt --all -- --check
          cargo test
      - name: Run example
        run: |
          set -e -x
          cargo install --path . --features cli --locked
          omikuji --help
          cd examples
          bash run_cli.sh

  python-sdist:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.14'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Query Python version
        run: |
          set -e -x
          which python
          python -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        run: |
          set -e -x
          python -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "packaging>=26.2" "milksnake>=0.1.6"
          python -m pip --version
          python -m wheel version
          python -m twine --version
      - name: Check Python code format
        run: |
          python -m pip install --user black
          python -m black --check ./
      - name: Build source distribution
        run: |
          python setup.py sdist
      - name: Install Rust (Linux/macOS)
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Test install from source distribution
        run: |
          python -m pip -vvv install --user dist/*
      - name: Check artifacts with twine
        run: |
          set -e -x
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ env.PYTHON_VERSION }}-${{ runner.OS }}-${{ runner.Arch }}
          path: dist/

  python-manylinux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64:latest
    env:
      manylinux: true
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Set PYBIN for manylinux Python
        # The manylinux pypa image has multiple Python versions installed in non-standard locations,
        # so we need to set PYBIN accordingly for the rest of the steps.
        run: |
          case ${{ matrix.python-version }} in
            3.10) PYBIN=/opt/python/cp310-cp310/bin/python ;;
            3.11) PYBIN=/opt/python/cp311-cp311/bin/python ;;
            3.12) PYBIN=/opt/python/cp312-cp312/bin/python ;;
            3.13) PYBIN=/opt/python/cp313-cp313/bin/python ;;
            3.14) PYBIN=/opt/python/cp314-cp314/bin/python ;;
          esac
          echo "PYBIN=$PYBIN" >> $GITHUB_ENV
      - name: Query Python version
        run: |
          set -e -x
          which "$PYBIN"
          "$PYBIN" -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        run: |
          set -e -x
          "$PYBIN" -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "milksnake>=0.1.6"
          "$PYBIN" -m pip --version
          "$PYBIN" -m wheel version
          "$PYBIN" -m twine --version
      - name: Check Python code format
        run: |
          "$PYBIN" -m pip install --user black
          "$PYBIN" -m black --check ./
      - name: Install Rust (Linux/macOS)
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Build wheels
        run: |
          "$PYBIN" -m pip -vvv wheel . -w wheelhouse/
      - name: auditwheel repair (manylinux)
        run: |
          set -e -x
          for whl in wheelhouse/${{ env.package_name }}-*.whl; do
            auditwheel repair "$whl" -w wheelhouse/
          done
          ls -lh wheelhouse/
      - name: Test installing wheels and run examples
        run: |
          set -e -x
          ls -lh wheelhouse/
          "$PYBIN" -m pip install ${{ env.package_name }} --no-index -f wheelhouse/ --user
          "$PYBIN" -c "import sys; sys.path.remove(''); import ${{ env.package_name }}; print('Installed version: ' + ${{ env.package_name }}.__version__)"
          cd examples
          "$PYBIN" run_py.py
          "$PYBIN" -m pip uninstall -y ${{ env.package_name }}
      - name: Prepare wheels for publish (manylinux)
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*manylinux*.whl dist/
      - name: Check artifacts with twine
        run: |
          set -e -x
          "$PYBIN" -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ matrix.python-version }}-${{ runner.OS }}-${{ runner.Arch }}
          path: dist/

  python-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Query Python version
        shell: bash
        run: |
          set -e -x
          python -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        shell: bash
        run: |
          set -e -x
          python -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "milksnake>=0.1.6"
          python -m pip --version
          python -m wheel version
          python -m twine --version
      - name: Check Python code format
        shell: bash
        run: |
          python -m pip install --user black
          python -m black --check ./
      - name: Install Rust (Windows)
        shell: bash
        run: |
          set -e
          curl -sSf -o rustup-init.exe https://win.rustup.rs
          ./rustup-init.exe -y
          echo "$USERPROFILE/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        shell: bash
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        shell: bash
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Build wheels
        shell: cmd
        run: >-
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -no_logo -arch=x64
          && python -m pip -vvv wheel . -w wheelhouse/
      - name: Test installing wheels and run examples
        shell: bash
        run: |
          set -e -x
          ls -lh wheelhouse/
          python -m pip install ${{ env.package_name }} --no-index -f wheelhouse/ --user
          python -c "import sys; sys.path.remove(''); import ${{ env.package_name }}; print('Installed version: ' + ${{ env.package_name }}.__version__)"
          cd examples
          python run_py.py
          python -m pip uninstall -y ${{ env.package_name }}
      - name: Prepare wheels for publish
        shell: bash
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*.whl dist/
      - name: Check artifacts with twine
        shell: bash
        run: |
          set -e -x
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ matrix.python-version }}-${{ runner.OS }}-${{ runner.Arch }}
          path: dist/

  python-macos:
    runs-on: macos-15
    env:
      SYSTEM_VERSION_COMPAT: 0
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Query Python version
        run: |
          set -e -x
          which python
          python -c "import sys; print(sys.version)"
      - name: Install dev dependencies
        run: |
          set -e -x
          python -m pip -vvv install --user --upgrade pip wheel "setuptools>=38.6.0" twine "milksnake>=0.1.6"
          python -m pip --version
          python -m wheel version
          python -m twine --version
      - name: Check Python code format
        run: |
          python -m pip install --user black
          python -m black --check ./
      - name: Install Rust (Linux/macOS)
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Query Rust and Cargo versions
        run: |
          rustup -V
          rustup component list --installed
          rustc -Vv
          cargo -V
      - name: Build wheels
        run: |
          python -m pip -vvv wheel . -w wheelhouse/
      - name: Delocate wheels (macOS)
        run: |
          set -e -x
          python -m pip install delocate
          delocate-wheel --version
          delocate-wheel --require-archs universal2 wheelhouse/${{ env.package_name }}-*.whl
          ls -lh wheelhouse/
      - name: Test installing wheels and run examples
        run: |
          set -e -x
          ls -lh wheelhouse/
          python -m pip install ${{ env.package_name }} --no-index -f wheelhouse/ --user
          python -c "import sys; sys.path.remove(''); import ${{ env.package_name }}; print('Installed version: ' + ${{ env.package_name }}.__version__)"
          cd examples
          python run_py.py
          python -m pip uninstall -y ${{ env.package_name }}
      - name: Prepare wheels for publish
        run: |
          set -e -x
          mkdir -p dist
          cp wheelhouse/${{ env.package_name }}*.whl dist/
      - name: Check artifacts with twine
        run: |
          set -e -x
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ matrix.python-version }}-${{ runner.OS }}-${{ runner.Arch }}
          path: dist/
